<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>PARKOUR 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="blocker">
  <div id="instructions">
    <h1>PARKOUR 3D</h1>
    <p>Roblox Tarzı First-Person</p>
    <div class="key-hints">
      <span><kbd>W A S D</kbd> Hareket</span>
      <span><kbd>SPACE</kbd> Zıpla / Çift Zıpla</span>
      <span><kbd>SHIFT</kbd> Sprint</span>
      <span><kbd>R</kbd> Yeniden Başla</span>
    </div>
    <button id="btnStart">▶ TIKLA VE OYNA</button>
  </div>
</div>

<div id="hud">
  <div id="crosshair">+</div>
  <div id="hud-top">
    <div class="hitem"><span>SKOR</span><b id="hScore">0</b></div>
    <div class="hitem center">
      <div class="lvname" id="hLvName">SEVİYE 1</div>
      <div class="pbar-wrap"><div class="pbar" id="hPbar"></div></div>
    </div>
    <div class="hitem right"><span>ÖLÜM</span><b id="hDeaths">0</b></div>
  </div>
  <div id="hud-bot">
    <div class="hp-wrap"><span>HP</span><div class="hp-bg"><div class="hp-fill" id="hHp"></div></div><b id="hHpNum">100</b></div>
    <div id="abilRow">
      <div class="abil" id="aJump"><div>↑↑</div><small>ÇİFT</small></div>
      <div class="abil" id="aDash"><div>»</div><small>DASH</small></div>
    </div>
  </div>
</div>

<div id="notifArea"></div>

<div id="deathScreen" class="overlay hidden">
  <div class="obox">
    <div style="font-size:3rem">💀</div>
    <h2>ÖLDÜN!</h2>
    <p id="dMsg">Düştün!</p>
    <button class="gbtn" id="bRespawn">YENİDEN DEN (R)</button>
    <button class="gbtn sec" id="bMenu">MENÜ</button>
  </div>
</div>

<div id="winScreen" class="overlay hidden">
  <div class="obox win">
    <div style="font-size:3rem">🏆</div>
    <h2>TAMAMLANDI!</h2>
    <div id="wStats"></div>
    <button class="gbtn" id="bNext">SONRAKİ SEVİYE →</button>
    <button class="gbtn sec" id="bMenuW">MENÜ</button>
  </div>
</div>

<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="game.js"></script>
</body>
</html>
